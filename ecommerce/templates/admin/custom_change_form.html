{% extends "admin/change_form.html" %}
{% load static %}

{% block content %}
  <style>
    .admin-help-box {
      background: #ffffff;                    /* fond blanc */
      border: 1px solid #0d6efd;              /* bleu principal (Bootstrap / Django-admin-like) */
      color: #0b3d91;                         /* texte bleu foncé */
      padding: 12px 16px;
      margin-bottom: 16px;
      border-radius: 6px;
      box-shadow: 0 1px 2px rgba(13,110,253,0.06);
      font-size: 14px;
    }
    .admin-help-box h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      color: #0d6efd;                         /* titre en bleu */
    }
    .admin-help-box ul, .admin-help-box ol {
      margin: 6px 0 0 18px;
      padding: 0;
    }

    /* petite bande bleu à gauche pour accent visuel (optionnel) */
    .admin-help-box::before {
      content: "";
      display: block;
      width: 6px;
      height: 100%;
      background: linear-gradient(#0d6efd, #0a58ca);
      float: left;
      margin-right: 12px;
      border-radius: 4px;
    }

    /* s'assurer que la mise en page ne casse pas le contenu existant */
    .admin-help-box > * { overflow: hidden; }
  </style>

  {% if admin_help %}
    <div class="admin-help-box" role="region" aria-label="Aide">
      {{ admin_help|safe }}
    </div>
  {% endif %}

  {{ block.super }}
{% endblock %}
